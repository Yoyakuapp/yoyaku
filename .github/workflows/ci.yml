name: Yoyaku CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yoyaku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/yoyaku_ci?schema=public
      NEXTAUTH_SECRET: ci-only-nextauth-secret-at-least-32-characters
      NEXTAUTH_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_ci_dummy_key_not_real
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_secret_not_real
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy_key_not_real

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: npm run build
